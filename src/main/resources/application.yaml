spring:
  application:
    name: spring-resilience-demo

resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        sliding-window-size: 5
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2